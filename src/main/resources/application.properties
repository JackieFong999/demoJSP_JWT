spring.application.name=demoJSP_JWT

# Tell Spring Boot to use JBoss's Log4j2 context
logging.log4j2.context.selector=org.apache.logging.log4j.core.async.AsyncLoggerContextSelector
logging.config=classpath:log4j2-jboss.xml

# 21/05/2026
# Enable debug logging for interceptors
logging.level.com.ocean.demoJSPJwt.interceptor=DEBUG
logging.level.com.ocean.demoJSPJwt.util=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.web=DEBUG

# Also show logs in console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# PostgreSQL Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/drs
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Jungle88\$

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate


# 19/08/2026
# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# For jqGrid
# WebJars configuration
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/webjars/**

# Disable data.sql initialization
spring.sql.init.mode=never

# Optional: Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Disable Spring Boot error handling for JBoss EAP
server.error.whitelabel.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration




